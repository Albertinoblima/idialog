<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Página não encontrada - iDialog">
    <title>404 - Página não encontrada | iDialog</title>

    <!-- CSS -->
    <link rel="stylesheet" href="src/styles/main.css">
    <link rel="stylesheet" href="src/styles/responsive.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="public/icon/1 iDialog icone.ico">

    <style>
        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 2rem;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: var(--primary-color, #1273EB);
            line-height: 1;
            margin-bottom: 1rem;
        }

        .error-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-dark, #333);
            margin-bottom: 1rem;
        }

        .error-desc {
            font-size: 1.1rem;
            color: var(--text-light, #666);
            margin-bottom: 2rem;
            max-width: 500px;
        }

        .error-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <main class="main">
        <div class="error-page">
            <div class="error-code">404</div>
            <h1 class="error-title">Página não encontrada</h1>
            <p class="error-desc">
                A página que você está procurando não existe ou foi movida.
                Verifique o endereço ou volte ao início.
            </p>
            <div class="error-actions">
                <a href="index.html" class="btn btn-primary">
                    <i class="fas fa-home"></i> Ir para o início
                </a>
                <a href="pages/contato.html" class="btn btn-secondary">
                    <i class="fas fa-envelope"></i> Falar conosco
                </a>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="assets/js/components.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
