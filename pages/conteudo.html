<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <!-- Google tag (gtag.js) -->

        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-MN7ZZZDKVP');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Albertino Bezerra Lima">
    <meta name="owner" content="Albertino Bezerra Lima - iDialog">
    <meta name="copyright" content="(c) 2026 Albertino Bezerra Lima - iDialog. Todos os direitos reservados.">
    <meta name="contact" content="albertinoblima@gmail.com">
    <meta name="description" content="Conteúdo dinâmico iDialog">
    <title>Conteúdo | iDialog</title>
    <link rel="stylesheet" href="../src/styles/main.css">
    <link rel="stylesheet" href="../src/styles/responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800&family=Exo+2:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <canvas id="matrix-canvas"></canvas>
    <div id="header-placeholder"></div>

    <main id="main-content">
        <section class="cms-public-hero">
            <div class="container">
                <p class="hero-kicker">Conteúdo Dinâmico</p>
                <h1 id="cms-title" class="hero-title">Carregando conteúdo...</h1>
                <p id="cms-summary" class="hero-subtitle">Aguarde enquanto o painel editorial entrega esta página.</p>
            </div>
        </section>

        <section class="cms-public-section">
            <div class="container cms-public-shell">
                <article class="cms-public-article">
                    <img id="cms-cover" class="cms-public-cover" alt="Capa do conteúdo" hidden>
                    <div id="cms-body" class="cms-public-body"></div>
                </article>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/matrix.js"></script>
    <script src="../assets/js/cms-public.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const slug = window.iDialogCMS.getSlugFromUrl();
            const title = document.getElementById('cms-title');
            const summary = document.getElementById('cms-summary');
            const body = document.getElementById('cms-body');
            const cover = document.getElementById('cms-cover');

            if (!slug) {
                title.textContent = 'Conteúdo não encontrado';
                summary.textContent = 'Informe um slug válido na URL para abrir esta página dinâmica.';
                return;
            }

            try {
                const item = await window.iDialogCMS.fetchContentBySlug(slug);
                document.title = `${item.seo_title || item.title} | iDialog`;
                title.textContent = item.title;
                summary.textContent = item.summary || 'Conteúdo publicado pelo painel iDialog.';
                body.innerHTML = item.body_html || '<p>Este conteúdo ainda não possui corpo HTML publicado.</p>';

                if (item.cover_url) {
                    cover.src = item.cover_url;
                    cover.hidden = false;
                }
            } catch (error) {
                title.textContent = 'Falha ao carregar';
                summary.textContent = 'O conteúdo solicitado não foi encontrado ou ainda não está publicado.';
                body.innerHTML = '<p>Publique o conteúdo no painel CMS e tente novamente.</p>';
            }
        });
    </script>
</body>

</html>
